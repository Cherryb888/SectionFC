<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Section FC club crest: black & yellow shield with SFC monogram, laurel wreath, stars, and football -->
  <defs>
    <linearGradient id="gold" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fff27a"/>
      <stop offset="0.4" stop-color="#e8ff00"/>
      <stop offset="1" stop-color="#c9dc00"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Stars (7 across the top in an arc) -->
  <g fill="url(#gold)" filter="url(#glow)">
    <g transform="translate(90,70) scale(0.55) rotate(-18)"><polygon points="0,-14 4,-4 14,-4 6,3 9,13 0,7 -9,13 -6,3 -14,-4 -4,-4"/></g>
    <g transform="translate(130,54) scale(0.6) rotate(-12)"><polygon points="0,-14 4,-4 14,-4 6,3 9,13 0,7 -9,13 -6,3 -14,-4 -4,-4"/></g>
    <g transform="translate(170,44) scale(0.65) rotate(-6)"><polygon points="0,-14 4,-4 14,-4 6,3 9,13 0,7 -9,13 -6,3 -14,-4 -4,-4"/></g>
    <g transform="translate(210,40) scale(0.68)"><polygon points="0,-14 4,-4 14,-4 6,3 9,13 0,7 -9,13 -6,3 -14,-4 -4,-4"/></g>
    <g transform="translate(250,44) scale(0.65) rotate(6)"><polygon points="0,-14 4,-4 14,-4 6,3 9,13 0,7 -9,13 -6,3 -14,-4 -4,-4"/></g>
    <g transform="translate(290,54) scale(0.6) rotate(12)"><polygon points="0,-14 4,-4 14,-4 6,3 9,13 0,7 -9,13 -6,3 -14,-4 -4,-4"/></g>
    <g transform="translate(330,70) scale(0.55) rotate(18)"><polygon points="0,-14 4,-4 14,-4 6,3 9,13 0,7 -9,13 -6,3 -14,-4 -4,-4"/></g>
  </g>

  <!-- Left laurel wreath -->
  <g stroke="url(#gold)" stroke-width="4" fill="url(#gold)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M110 110 C 70 170, 60 240, 100 310" fill="none"/>
    <!-- leaves -->
    <g>
      <ellipse cx="92" cy="130" rx="14" ry="6" transform="rotate(-40 92 130)"/>
      <ellipse cx="82" cy="155" rx="16" ry="7" transform="rotate(-30 82 155)"/>
      <ellipse cx="76" cy="185" rx="17" ry="7" transform="rotate(-15 76 185)"/>
      <ellipse cx="74" cy="215" rx="17" ry="7" transform="rotate(0 74 215)"/>
      <ellipse cx="78" cy="245" rx="17" ry="7" transform="rotate(15 78 245)"/>
      <ellipse cx="86" cy="275" rx="16" ry="7" transform="rotate(30 86 275)"/>
      <ellipse cx="98" cy="300" rx="14" ry="6" transform="rotate(45 98 300)"/>
      <!-- inner row -->
      <ellipse cx="108" cy="140" rx="11" ry="5" transform="rotate(-55 108 140)"/>
      <ellipse cx="102" cy="170" rx="13" ry="6" transform="rotate(-42 102 170)"/>
      <ellipse cx="98" cy="200" rx="13" ry="6" transform="rotate(-25 98 200)"/>
      <ellipse cx="98" cy="230" rx="13" ry="6" transform="rotate(-8 98 230)"/>
      <ellipse cx="102" cy="260" rx="13" ry="6" transform="rotate(15 102 260)"/>
      <ellipse cx="114" cy="285" rx="12" ry="5" transform="rotate(35 114 285)"/>
    </g>
  </g>

  <!-- Right laurel wreath -->
  <g stroke="url(#gold)" stroke-width="4" fill="url(#gold)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M290 110 C 330 170, 340 240, 300 310" fill="none"/>
    <g>
      <ellipse cx="308" cy="130" rx="14" ry="6" transform="rotate(40 308 130)"/>
      <ellipse cx="318" cy="155" rx="16" ry="7" transform="rotate(30 318 155)"/>
      <ellipse cx="324" cy="185" rx="17" ry="7" transform="rotate(15 324 185)"/>
      <ellipse cx="326" cy="215" rx="17" ry="7" transform="rotate(0 326 215)"/>
      <ellipse cx="322" cy="245" rx="17" ry="7" transform="rotate(-15 322 245)"/>
      <ellipse cx="314" cy="275" rx="16" ry="7" transform="rotate(-30 314 275)"/>
      <ellipse cx="302" cy="300" rx="14" ry="6" transform="rotate(-45 302 300)"/>
      <ellipse cx="292" cy="140" rx="11" ry="5" transform="rotate(55 292 140)"/>
      <ellipse cx="298" cy="170" rx="13" ry="6" transform="rotate(42 298 170)"/>
      <ellipse cx="302" cy="200" rx="13" ry="6" transform="rotate(25 302 200)"/>
      <ellipse cx="302" cy="230" rx="13" ry="6" transform="rotate(8 302 230)"/>
      <ellipse cx="298" cy="260" rx="13" ry="6" transform="rotate(-15 298 260)"/>
      <ellipse cx="286" cy="285" rx="12" ry="5" transform="rotate(-35 286 285)"/>
    </g>
  </g>

  <!-- Shield body (fill black with yellow outline) -->
  <path d="M140 95 H260 C272 95 278 102 278 115 V210 C278 260 240 305 200 320 C160 305 122 260 122 210 V115 C122 102 128 95 140 95 Z"
        fill="#0a0a0f" stroke="url(#gold)" stroke-width="5" stroke-linejoin="round"/>

  <!-- Player silhouette inside shield (stylized kicker) -->
  <g stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- head -->
    <path d="M210 130 C 218 128, 224 134, 223 142 C 222 150, 215 152, 210 149"/>
    <!-- neck/torso -->
    <path d="M212 150 C 210 160, 214 172, 208 185 C 200 198, 195 210, 198 225"/>
    <!-- arm -->
    <path d="M205 175 C 195 180, 190 192, 192 204"/>
    <!-- front leg kicking down -->
    <path d="M198 225 C 195 240, 200 255, 205 270"/>
    <!-- back/support leg -->
    <path d="M203 215 C 215 225, 218 245, 210 260"/>
    <!-- foot toward ball -->
    <path d="M205 270 C 200 275, 198 280, 202 284"/>
  </g>

  <!-- SFC monogram centered-upper inside shield -->
  <text x="200" y="182" text-anchor="middle"
        font-family="'Oswald','Arial Black',sans-serif"
        font-weight="900"
        font-size="66"
        letter-spacing="2"
        fill="url(#gold)">SFC</text>

  <!-- Football at bottom of shield -->
  <g transform="translate(200,288)">
    <circle r="26" fill="url(#gold)" stroke="#0a0a0f" stroke-width="1.5"/>
    <g fill="#0a0a0f">
      <polygon points="0,-11 10,-4 6,8 -6,8 -10,-4"/>
      <polygon points="0,-11 -10,-4 -17,-10 -13,-20 -3,-20"/>
      <polygon points="0,-11 10,-4 17,-10 13,-20 3,-20"/>
      <polygon points="-6,8 -16,12 -20,4 -14,-2"/>
      <polygon points="6,8 16,12 20,4 14,-2"/>
      <polygon points="-6,8 0,18 6,8"/>
    </g>
    <circle r="26" fill="none" stroke="#0a0a0f" stroke-width="1"/>
  </g>

  <!-- Bottom monogram knot -->
  <g transform="translate(200,355)" stroke="url(#gold)" stroke-width="3" fill="none">
    <circle r="14"/>
    <path d="M -9 -4 Q 0 -12, 9 -4 Q 12 4, 5 9 Q 0 12, -5 9 Q -12 4, -9 -4 Z"/>
  </g>
</svg>
