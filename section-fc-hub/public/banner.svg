<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#05050a"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0e1a0e"/>
      <stop offset="0.5" stop-color="#18381e"/>
      <stop offset="1" stop-color="#0c1a0d"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="0%" r="70%">
      <stop offset="0" stop-color="#e8ff00" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#e8ff00" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#e8ff00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot2" cx="50%" cy="0%" r="60%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="pitchClip">
      <rect x="330" y="140" width="540" height="220" rx="18"/>
    </clipPath>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="100" text-anchor="middle"
        font-family="'Oswald','Arial',sans-serif" font-weight="700"
        font-size="58" letter-spacing="12" fill="#e8ff00">SECTION FC</text>

  <!-- Rounded stadium panel -->
  <g clip-path="url(#pitchClip)">
    <rect x="330" y="140" width="540" height="220" fill="url(#pitch)"/>

    <!-- floodlight spots from top -->
    <ellipse cx="430" cy="140" rx="120" ry="200" fill="url(#spot2)"/>
    <ellipse cx="600" cy="140" rx="160" ry="230" fill="url(#spot)"/>
    <ellipse cx="770" cy="140" rx="120" ry="200" fill="url(#spot2)"/>

    <!-- Stadium lights row -->
    <g fill="#fffbe3" filter="url(#softglow)">
      <circle cx="380" cy="152" r="5"/>
      <circle cx="420" cy="150" r="6"/>
      <circle cx="460" cy="148" r="6"/>
      <circle cx="500" cy="146" r="6"/>
      <circle cx="540" cy="145" r="6"/>
      <circle cx="580" cy="144" r="6"/>
      <circle cx="620" cy="144" r="6"/>
      <circle cx="660" cy="145" r="6"/>
      <circle cx="700" cy="146" r="6"/>
      <circle cx="740" cy="148" r="6"/>
      <circle cx="780" cy="150" r="6"/>
      <circle cx="820" cy="152" r="5"/>
    </g>

    <!-- Mist -->
    <ellipse cx="600" cy="230" rx="260" ry="40" fill="#ffffff" opacity="0.05"/>
    <ellipse cx="600" cy="280" rx="320" ry="30" fill="#ffffff" opacity="0.04"/>

    <!-- Pitch markings: center circle, halfway line, penalty box -->
    <g stroke="#e8ff00" stroke-width="2" fill="none" opacity="0.85">
      <line x1="330" y1="290" x2="870" y2="290"/>
      <circle cx="600" cy="290" r="36"/>
      <circle cx="600" cy="290" r="3" fill="#e8ff00"/>
      <!-- top penalty box -->
      <rect x="520" y="300" width="160" height="60"/>
      <rect x="560" y="300" width="80" height="24"/>
    </g>

    <!-- Side line markers -->
    <g stroke="#ffffff" stroke-width="1" opacity="0.25">
      <line x1="330" y1="340" x2="870" y2="340"/>
    </g>
  </g>

  <!-- Panel border -->
  <rect x="330" y="140" width="540" height="220" rx="18" fill="none" stroke="#e8ff0022" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="600" y="420" text-anchor="middle"
        font-family="'Oswald','Arial',sans-serif" font-weight="400"
        font-size="22" letter-spacing="6" fill="#e8ff00">PLAY WITH YOUR HEART ON YOUR SLEEVE</text>
</svg>
